repos:
  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: env PYTHONPATH=. pytest -q
        language: python
        additional_dependencies:
          - pytest==9.0.2
          - tensorflow==2.17.1
          - keras==3.13.2
          - numpy==1.26.4
          - scipy==1.12.0
          - matplotlib==3.8.3
          - pydoe==0.3.8
          - opencv-python-headless==4.11.0.86
        pass_filenames: false
        stages: [pre-commit]