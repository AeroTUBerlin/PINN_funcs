name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package with dev extras
        run: python -m pip install -e .[dev]
      - name: Lint with ruff
        run: ruff check .
      - name: Run tests
        run: pytest -q
